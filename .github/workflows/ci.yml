name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r backend/requirements.txt
      - name: Lint with ruff
        run: |
          source venv/bin/activate
          pip install ruff
          ruff check backend/src/knot/
      - name: Test with pytest
        run: |
          source venv/bin/activate
          pip install pytest pytest-asyncio pytest-mock
          python -m pytest backend/tests/ -x -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true  # non-blocking, missing node_modules expected
      - name: Build
        run: |
          cd frontend
          npx vite build
