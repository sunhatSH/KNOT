version: "3.8"

services:
  milvus:
    image: milvusdb/milvus:latest
    ports:
      - "19530:19530"
    environment:
      ETCD_USE_EMBED: "true"
    volumes:
      - milvus_data:/var/lib/milvus

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: knot
      POSTGRES_USER: knot
      POSTGRES_PASSWORD: knot_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  milvus_data:
  postgres_data:
